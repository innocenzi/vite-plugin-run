name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: v24
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish
        run: npm publish --provenance --access public

      - run: bun x changelogithub --no-group --no-capitalize --no-emoji
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
